<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kitseruki — Premium Gaming & Digital Studio crafting immersive worlds and next-generation interactive experiences.">
    <title>Kitseruki Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --neon: #00f5ff;
        }
        
        * { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050507;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        #webgl-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.85;
        }

        /* Rest of your existing styles (phone, content, etc.) remain the same */
        .phone-frame { /* ... same as v4.4 ... */ }
        /* (Full styles omitted for brevity - copy from previous version) */
    </style>
</head>
<body class="min-h-screen">
    <!-- WebGL Canvas -->
    <canvas id="webgl-background"></canvas>

    <div class="max-w-screen-2xl mx-auto relative z-10">
        <!-- Header, Phone, Content sections remain unchanged from v4.4 -->
        <!-- ... paste your full structure from the last version here ... -->
    </div>

    <script>
        // === THREE.JS BACKGROUND ===
        let scene, camera, renderer, particles;
        let mouseX = 0, mouseY = 0;

        function initWebGL() {
            const canvas = document.getElementById('webgl-background');
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // Particle System
            const particleCount = 1800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i]     = (Math.random() - 0.5) * 80;
                positions[i + 1] = (Math.random() - 0.5) * 80;
                positions[i + 2] = (Math.random() - 0.5) * 80;

                const color = new THREE.Color().setHSL(0.5 + Math.random() * 0.1, 0.8, 0.7);
                colors[i]     = color.r;
                colors[i + 1] = color.g;
                colors[i + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.12,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Gentle animation loop
            function animate() {
                requestAnimationFrame(animate);
                
                particles.rotation.y += 0.0002;
                particles.rotation.x += 0.0001;

                // Mouse influence
                particles.rotation.y += (mouseX * 0.00008);
                particles.rotation.x += (mouseY * 0.00008);

                renderer.render(scene, camera);
            }
            animate();
        }

        // Mouse tracking
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Resize handler
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Initialize everything
        window.onload = () => {
            initWebGL();
            
            // Your existing menu + section logic from v4.4 here...
            createPhoneMenu('phone-menu-mobile');
            createPhoneMenu('phone-menu-desktop');
            switchSection('home');
            addSwipeNavigation('phone-screen-mobile');
            addSwipeNavigation('phone-screen-desktop');
        };
    </script>
</body>
</html>
